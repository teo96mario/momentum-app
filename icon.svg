<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#fc5c7d"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0d4ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Inner glow -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" opacity="0.3"/>
  <!-- Lightning bolt -->
  <path d="M296 64 L176 284 L240 284 L216 448 L336 228 L272 228 L296 64Z"
        fill="url(#bolt)"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="4"
        stroke-linejoin="round"/>
</svg>
